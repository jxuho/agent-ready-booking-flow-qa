name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend:
    name: Backend API
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: booking_eval
          POSTGRES_PASSWORD: booking_eval
          POSTGRES_DB: booking_eval
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U booking_eval -d booking_eval"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: sqlite+pysqlite:///:memory:
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install backend dependencies
        run: python -m pip install -e "apps/api[dev]"

      - name: Run Alembic migrations against PostgreSQL
        env:
          DATABASE_URL: postgresql+psycopg://booking_eval:booking_eval@localhost:5432/booking_eval
        run: cd apps/api && alembic upgrade head

      - name: Ruff check
        run: python -m ruff check apps/api/alembic apps/api/app apps/api/tests

      - name: Pytest
        run: python -m pytest apps/api/tests

  frontend:
    name: Frontend and browser tests
    runs-on: ubuntu-latest

    env:
      VITE_API_BASE_URL: http://localhost:8000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend typecheck
        run: npm run typecheck

      - name: Frontend build
        run: npm run test:web

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Playwright E2E, accessibility, and eval report tests
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
