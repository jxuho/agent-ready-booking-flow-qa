services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-booking_eval}
      POSTGRES_USER: ${POSTGRES_USER:-booking_eval}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-booking_eval}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-booking_eval} -d ${POSTGRES_DB:-booking_eval}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-booking_eval}:${POSTGRES_PASSWORD:-booking_eval}@db:5432/${POSTGRES_DB:-booking_eval}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://web:5173}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data:
